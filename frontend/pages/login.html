<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Inventario POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <script defer src="../ui-enhancements.js"></script>
</head>
<body>
  <div class="app-container" style="justify-content: center; align-items: center; padding: 2rem;">
    <div class="card" style="max-width: 480px; width: 100%;">
      <div class="card-header">
        <h2>🔐 Acceso al sistema</h2>
      </div>
      <div class="card-body">
        <form id="formLogin" class="form">
          <div class="form-group">
            <label>Usuario o correo</label>
            <input type="text" id="usuario" required>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" required>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Ingresar</button>
          </div>
        </form>
        <p style="margin-top: 1rem; color: var(--gray);">Credenciales iniciales: admin / admin123</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/pages/login.js"></script>
</body>
</html>
