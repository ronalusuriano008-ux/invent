<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios - Inventario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <script defer src="../ui-enhancements.js"></script>
  <script defer src="../api-client.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <h1><i class="fa-solid fa-users" aria-hidden="true"></i> Gestión de usuarios</h1>
          <p class="tagline">Accesos, roles y permisos</p>
        </div>
        <nav class="nav-links">
          <a href="/" class="nav-link"><i class="fa-solid fa-gauge-high" aria-hidden="true"></i> Dashboard</a>
          <a href="/inventario" class="nav-link"><i class="fa-solid fa-boxes-stacked" aria-hidden="true"></i> Inventario</a>
          <a href="/movimientos" class="nav-link"><i class="fa-solid fa-arrow-right-arrow-left" aria-hidden="true"></i> Movimientos</a>
          <a href="/usuarios" class="nav-link active"><i class="fa-solid fa-users" aria-hidden="true"></i> Usuarios</a>
          <a href="/admin" class="nav-link"><i class="fa-solid fa-chart-pie" aria-hidden="true"></i> Administración</a>
          <a href="/mantenimiento" class="nav-link"><i class="fa-solid fa-screwdriver-wrench" aria-hidden="true"></i> Mantenimiento</a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div class="section">
        <h2 class="section-title">Crear usuario</h2>
        <form id="formUsuario" class="form">
          <div class="form-row">
            <div class="form-group">
              <label>Usuario</label>
              <input type="text" id="usuario" required>
            </div>
            <div class="form-group">
              <label>Nombre</label>
              <input type="text" id="nombre" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Correo</label>
              <input type="email" id="correo" required>
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <input type="password" id="password" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Rol</label>
              <select id="rol">
                <option value="1">Administrador</option>
                <option value="2">Vendedor</option>
              </select>
            </div>
            <div class="form-group">
              <label>Estado</label>
              <select id="activo">
                <option value="true">Activo</option>
                <option value="false">Inactivo</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar usuario</button>
          </div>
        </form>
      </div>

      <div class="section">
        <h2 class="section-title">Usuarios registrados</h2>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaUsuarios">
              <tr><td colspan="6" class="text-center">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/pages/usuarios.js"></script>
</body>
</html>
